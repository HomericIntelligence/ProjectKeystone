version: '3.8'

services:
  # Build and run tests
  test:
    build:
      context: .
      target: runtime
    image: projectkeystone:${GIT_COMMIT}-test
    container_name: projectkeystone-test-${GIT_COMMIT}
    environment:
      - GIT_COMMIT=${GIT_COMMIT}
      - BUILD_UID=${BUILD_UID}
      - BUILD_GID=${BUILD_GID}

  # Production deployment
  production:
    build:
      context: .
      target: production
    image: projectkeystone:${GIT_COMMIT}-production
    container_name: projectkeystone-prod-${GIT_COMMIT}
    ports:
      - "8080:8080"  # Health check
      - "9090:9090"  # Metrics
      - "50051:50051"  # gRPC (future)
    environment:
      - WORKER_COUNT=4
      - LOG_LEVEL=info
      - HEALTH_CHECK_PORT=8080
      - METRICS_PORT=9090
      - GIT_COMMIT=${GIT_COMMIT}
      - BUILD_UID=${BUILD_UID}
      - BUILD_GID=${BUILD_GID}

  # Development environment with mounted source
  dev:
    build:
      context: .
      target: development
      args:
        BUILD_UID: "${BUILD_UID}"
        BUILD_GID: "${BUILD_GID}"
    image: projectkeystone-dev:${GIT_COMMIT}-dev
    container_name: projectkeystone-dev-${GIT_COMMIT}
    user: "${BUILD_UID}:${BUILD_GID}"  # Run as host user
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
    environment:
      - HOME=/workspace/.docker-home  # Avoid permission issues with $HOME
      - GIT_COMMIT=${GIT_COMMIT}
      - BUILD_UID=${BUILD_UID}
      - BUILD_GID=${BUILD_GID}

  # Build only (for CI/CD)
  build:
    build:
      context: .
      target: builder
    image: projectkeystone-builder:${GIT_COMMIT}-latest
    container_name: projectkeystone-build-${GIT_COMMIT}
    volumes:
      - .:/workspace
    environment:
      - GIT_COMMIT=${GIT_COMMIT}
      - BUILD_UID=${BUILD_UID}
      - BUILD_GID=${BUILD_GID}
    command: >
      bash -c "cd build/debug && cmake -G Ninja ../.. && ninja"