version: '3.8'

services:
  # Build and run tests
  test:
    build:
      context: .
      target: runtime
    image: projectkeystone:latest
    container_name: projectkeystone-test
    # Uses default CMD from Dockerfile which runs all tests

  # Production deployment
  production:
    build:
      context: .
      target: production
    image: projectkeystone:production
    container_name: projectkeystone-prod
    ports:
      - "8080:8080"  # Health check
      - "9090:9090"  # Metrics
      - "50051:50051"  # gRPC (future)
    environment:
      - WORKER_COUNT=4
      - LOG_LEVEL=info
      - HEALTH_CHECK_PORT=8080
      - METRICS_PORT=9090

  # Development environment with mounted source
  dev:
    build:
      context: .
      target: development
      args:
        BUILD_UID: "${BUILD_UID:-1000}"
        BUILD_GID: "${BUILD_GID:-1000}"
    image: projectkeystone-dev:latest
    container_name: projectkeystone-dev
    user: "${BUILD_UID:-1000}:${BUILD_GID:-1000}"  # Run as host user
    volumes:
      - .:/workspace
      # Removed build-cache volume to support multiple build directories (build/debug, build/asan, etc.)
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
    environment:
      - HOME=/workspace/.docker-home  # Avoid permission issues with $HOME

  # Build only (for CI/CD)
  build:
    build:
      context: .
      target: builder
    image: projectkeystone-builder:latest
    container_name: projectkeystone-build
    volumes:
      - .:/workspace
      # Removed build-cache volume to support multiple build directories
    command: >
      bash -c "cd build/asan && cmake -G Ninja ../.. && ninja"

# Removed build-cache volume to support parallel builds in multiple directories
# Each build mode (debug, release, asan, tsan) now uses its own build/MODE/ directory
