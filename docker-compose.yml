version: '3.8'

services:
  # Build and run tests
  test:
    build:
      context: .
      target: runtime
    image: projectkeystone:latest
    container_name: projectkeystone-test
    command: phase1_e2e_tests

  # Production deployment
  production:
    build:
      context: .
      target: production
    image: projectkeystone:production
    container_name: projectkeystone-prod
    ports:
      - "8080:8080"  # Health check
      - "9090:9090"  # Metrics
      - "50051:50051"  # gRPC (future)
    environment:
      - WORKER_COUNT=4
      - LOG_LEVEL=info
      - HEALTH_CHECK_PORT=8080
      - METRICS_PORT=9090

  # Development environment with mounted source
  dev:
    build:
      context: .
      target: development
    image: projectkeystone-dev:latest
    container_name: projectkeystone-dev
    volumes:
      - .:/workspace
      - build-cache:/workspace/build
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash

  # Build only (for CI/CD)
  build:
    build:
      context: .
      target: builder
    image: projectkeystone-builder:latest
    container_name: projectkeystone-build
    volumes:
      - .:/workspace
      - build-cache:/workspace/build
    command: >
      bash -c "cd build && cmake -G Ninja .. && ninja"

volumes:
  build-cache:
    driver: local
