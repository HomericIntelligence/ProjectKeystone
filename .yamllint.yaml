# YAML Lint configuration for ProjectKeystone
# See https://yamllint.readthedocs.io/en/stable/configuration.html

extends: default

# Ignore Helm template files (they contain Go template syntax)
ignore: |
  helm/**/templates/

rules:
  # Line length - allow longer lines for readability
  line-length:
    max: 120
    level: warning

  # Indentation - use 2 spaces
  indentation:
    spaces: 2
    indent-sequences: true

  # Comments - require space after #
  comments:
    min-spaces-from-content: 1

  # Document start - don't require ---
  document-start: disable

  # Truthy values - allow yes/no
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
