name: Build and Test (Reusable)

on:
  workflow_call:
    inputs:
      build-type:
        description: Build type (debug or release)
        type: string
        default: 'debug'
      sanitizer:
        description: Sanitizer to use (asan, ubsan, tsan, lsan, msan, or empty)
        type: string
        default: ''
      run-benchmarks:
        description: Run benchmarks after tests
        type: boolean
        default: false
      timeout-minutes:
        description: Job timeout in minutes
        type: number
        default: 30
    outputs:
      test-passed:
        description: Whether all tests passed
        value: ${{ jobs.build-test.outputs.test-passed }}
      build-dir:
        description: Build directory used
        value: ${{ jobs.build-test.outputs.build-dir }}

jobs:
  build-test:
    name: Build & Test (${{ inputs.build-type }}${{ inputs.sanitizer && format('.{0}', inputs.sanitizer) || '' }})
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}

    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      build-dir: ${{ steps.setup.outputs.build-dir }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        uses: ./.github/actions/install-build-deps

      - name: Compute build directory
        id: setup
        run: |
          BUILD_DIR="build/x86.${{ inputs.build-type }}"
          if [ -n "${{ inputs.sanitizer }}" ]; then
            BUILD_DIR="${BUILD_DIR}.${{ inputs.sanitizer }}"
          fi
          echo "build-dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "Building to: $BUILD_DIR"

      - name: Build with Makefile
        run: |
          # Construct the make target
          TARGET="compile.${{ inputs.build-type }}"
          if [ -n "${{ inputs.sanitizer }}" ]; then
            TARGET="${TARGET}.${{ inputs.sanitizer }}"
          fi
          TARGET="${TARGET}.native"

          echo "Running: make $TARGET"
          make $TARGET

      - name: Run tests
        id: test
        run: |
          # Construct the test target
          TARGET="test.${{ inputs.build-type }}"
          if [ -n "${{ inputs.sanitizer }}" ]; then
            TARGET="${TARGET}.${{ inputs.sanitizer }}"
          fi
          TARGET="${TARGET}.native"

          echo "Running: make $TARGET"
          set +e
          make $TARGET
          TEST_RESULT=$?
          set -e

          if [ $TEST_RESULT -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit $TEST_RESULT
          fi

      - name: Run benchmarks
        if: inputs.run-benchmarks
        run: |
          echo "Running: make benchmark.native"
          make benchmark.native

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ inputs.build-type }}-${{ inputs.sanitizer || 'none' }}
          path: |
            ${{ steps.setup.outputs.build-dir }}/Testing/
            ${{ steps.setup.outputs.build-dir }}/*.log
          retention-days: 7
          if-no-files-found: ignore
