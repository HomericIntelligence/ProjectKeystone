name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-all:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test environment
        run: |
          docker build --target runtime -t projectkeystone:test .

      - name: Run all tests
        id: run-tests
        run: |
          mkdir -p test-results
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/workspace/test-results \
            projectkeystone:test \
            bash -c "cd build && \
              ctest --output-on-failure --output-junit /workspace/test-results/results.xml || exit 1"
        continue-on-error: true

      - name: Parse test results
        if: always()
        id: parse-results
        run: |
          # Count tests from ctest output
          if [ -f "test-results/results.xml" ]; then
            # Extract test counts from JUnit XML
            total=$(grep -o 'tests="[0-9]*"' test-results/results.xml | head -1 | grep -o '[0-9]*' || echo "0")
            failures=$(grep -o 'failures="[0-9]*"' test-results/results.xml | head -1 | grep -o '[0-9]*' || echo "0")
            passed=$((total - failures))

            echo "total=$total" >> $GITHUB_OUTPUT
            echo "passed=$passed" >> $GITHUB_OUTPUT
            echo "failed=$failures" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Generate test report
        if: always()
        id: report
        run: |
          echo "## Test Results" > report.md
          echo "" >> report.md

          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
            echo "✅ **All tests passed!**" >> report.md
          else
            echo "❌ **Some tests failed**" >> report.md
          fi

          echo "" >> report.md
          echo "- **Total**: ${{ steps.parse-results.outputs.total }}" >> report.md
          echo "- **Passed**: ${{ steps.parse-results.outputs.passed }}" >> report.md
          echo "- **Failed**: ${{ steps.parse-results.outputs.failed }}" >> report.md

          echo "" >> report.md
          echo "### Test Suites Included" >> report.md
          echo "" >> report.md
          echo "- Phase 1: L0 ↔ L3 Basic Delegation" >> report.md
          echo "- Phase 2: L0 ↔ L2 ↔ L3 Coordination" >> report.md
          echo "- Phase 3: L0 ↔ L1 ↔ L2 ↔ L3 Full Hierarchy" >> report.md
          echo "- Phase 4: Multi-Component Parallel Execution" >> report.md
          echo "- Phase 5: Chaos Engineering & Resilience" >> report.md
          echo "- Phase A: Priority Scheduling" >> report.md
          echo "- Phase B: Deadline Scheduling" >> report.md
          echo "- Phase D: Distributed Work Stealing" >> report.md
          echo "- Unit Tests: Core Components" >> report.md

          echo "" >> report.md
          echo "---" >> report.md
          echo "*Workflow: [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: report.md
          retention-days: 30

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Check test status
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" != "success" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
