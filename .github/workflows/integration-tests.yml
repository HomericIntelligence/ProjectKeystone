name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        suite:
          - phase1  # L0 <-> L3 basic delegation
          - phase2  # L0 <-> L2 <-> L3 coordination
          - phase3  # L0 <-> L1 <-> L2 <-> L3 full hierarchy
          - phase4  # Multi-component parallel execution
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test environment
        run: |
          docker build --target runtime -t projectkeystone:test .

      - name: Check for test suite
        id: check-suite
        run: |
          if docker run --rm projectkeystone:test ls /workspace/build/${{ matrix.suite }}_e2e_tests 2>/dev/null; then
            echo "suite_exists=true" >> $GITHUB_OUTPUT
          else
            echo "suite_exists=false" >> $GITHUB_OUTPUT
            echo "Test suite ${{ matrix.suite }} not implemented yet"
          fi

      - name: Run integration tests (${{ matrix.suite }})
        if: steps.check-suite.outputs.suite_exists == 'true'
        id: run-tests
        run: |
          mkdir -p test-results/${{ matrix.suite }}
          docker run --rm \
            -v ${{ github.workspace }}/test-results/${{ matrix.suite }}:/workspace/test-results \
            projectkeystone:test \
            bash -c "cd build && \
              ./${{ matrix.suite }}_e2e_tests \
                --reporter JUnit::out=/workspace/test-results/results.xml \
                '[e2e]' || exit 1"
        continue-on-error: true

      - name: Generate suite summary
        run: |
          if [ "${{ steps.check-suite.outputs.suite_exists }}" = "true" ]; then
            if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
              echo "✅ ${{ matrix.suite }}" > test-results/${{ matrix.suite }}/status.txt
            else
              echo "❌ ${{ matrix.suite }}" > test-results/${{ matrix.suite }}/status.txt
            fi
          else
            echo "⚠️ ${{ matrix.suite }} (not implemented)" > test-results/${{ matrix.suite }}/status.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results-${{ matrix.suite }}
          path: test-results/${{ matrix.suite }}/
          retention-days: 30

  integration-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-integration]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Generate integration report
        id: report
        run: |
          echo "## Integration Test Results" > report.md
          echo "" >> report.md
          echo "| Phase | Status | Description |" >> report.md
          echo "|-------|--------|-------------|" >> report.md

          for phase in phase1 phase2 phase3 phase4; do
            if [ -f "all-results/integration-results-${phase}/status.txt" ]; then
              status=$(cat "all-results/integration-results-${phase}/status.txt")
              case "$phase" in
                phase1) desc="L0 ↔ L3 Basic Delegation" ;;
                phase2) desc="L0 ↔ L2 ↔ L3 Coordination" ;;
                phase3) desc="L0 ↔ L1 ↔ L2 ↔ L3 Full Hierarchy" ;;
                phase4) desc="Multi-Component Parallel" ;;
              esac
              echo "| $phase | $status | $desc |" >> report.md
            else
              echo "| $phase | ⚠️ No results | Unknown |" >> report.md
            fi
          done

          echo "" >> report.md
          echo "---" >> report.md
          echo "*Workflow: [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: report.md
          retention-days: 30

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Integration Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Check integration status
        run: |
          # Fail if any required tests failed (not just missing)
          if grep -q "❌" report.md; then
            echo "::error::One or more integration tests failed"
            exit 1
          fi
