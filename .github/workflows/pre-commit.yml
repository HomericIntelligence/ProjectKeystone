name: Pre-commit Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        id: pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true

      - name: Display failure instructions
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Pre-commit checks failed. To fix locally:"
          echo "  1. Install pre-commit: pip install pre-commit"
          echo "  2. Register hooks: pre-commit install"
          echo "  3. Run hooks: pre-commit run --all-files"
          echo "  4. Commit the fixes and push"
          exit 1

  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14

      - name: Check C++ formatting
        run: |
          find include src tests -name '*.cpp' -o -name '*.hpp' | xargs clang-format-14 --dry-run --Werror

  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-14 cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem \
            --inline-suppr --quiet \
            -I include \
            src/ tests/ || true

      - name: Create compile_commands.json placeholder
        run: |
          mkdir -p build
          echo '[]' > build/compile_commands.json

      - name: Run clang-tidy (informational)
        run: |
          find src include -name '*.cpp' -o -name '*.hpp' | head -10 | \
          xargs -I {} clang-tidy-14 {} -- -std=c++20 -I include || true
        continue-on-error: true
