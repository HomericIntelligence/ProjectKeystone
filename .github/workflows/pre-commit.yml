name: Pre-commit Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install clang-format-18 for pre-commit
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        id: pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true

      - name: Display failure instructions
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Pre-commit checks failed. To fix locally:"
          echo "  1. Install pre-commit: pip install pre-commit"
          echo "  2. Register hooks: pre-commit install"
          echo "  3. Run hooks: pre-commit run --all-files"
          echo "  4. Commit the fixes and push"
          exit 1
