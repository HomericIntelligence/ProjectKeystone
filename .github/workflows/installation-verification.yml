name: Installation Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  verify-ubuntu-latest:
    name: Verify on Ubuntu Latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgtest-dev \
            lcov

      - name: Verify GCC version
        run: |
          gcc --version
          g++ --version

      - name: Run installation verification script
        run: |
          chmod +x scripts/verify_install.sh
          ./scripts/verify_install.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-logs-ubuntu-latest
          path: |
            build/build.log
            build/test.log
          retention-days: 7

  verify-ubuntu-22-04:
    name: Verify on Ubuntu 22.04
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgtest-dev

      - name: Run installation verification script
        run: |
          chmod +x scripts/verify_install.sh
          ./scripts/verify_install.sh

  verify-readme-commands:
    name: Verify README.md Commands
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build

      - name: Test Quick Start - Build and Test
        run: |
          # From README.md Quick Start section
          mkdir build && cd build
          cmake -G Ninja ..
          ninja
          ctest --output-on-failure

      - name: Test Docker Build
        run: |
          # From README.md Docker Build section
          docker-compose up --exit-code-from test test

      - name: Test Development Environment
        run: |
          # From README.md Docker Build section
          docker-compose up -d dev
          docker-compose exec -T dev bash -c "cd build && cmake -G Ninja .. && ninja"
          docker-compose down

  verify-documentation-accuracy:
    name: Verify Documentation Accuracy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for broken links in documentation
        run: |
          # Find all markdown files
          find . -name "*.md" -type f > md_files.txt

          # Check for broken internal links (optional - requires markdown-link-check)
          if command -v markdown-link-check &> /dev/null; then
            while read -r file; do
              markdown-link-check "$file" || true
            done < md_files.txt
          else
            echo "markdown-link-check not installed - skipping link validation"
          fi

      - name: Verify scripts exist and are executable
        run: |
          # Check scripts mentioned in README.md
          test -x scripts/test_docker.sh || (echo "scripts/test_docker.sh not executable" && exit 1)
          test -x scripts/verify_install.sh || (echo "scripts/verify_install.sh not executable" && exit 1)

          # Optional scripts (warn if missing)
          test -f scripts/generate_coverage.sh || echo "::warning::scripts/generate_coverage.sh not found"
          test -f scripts/run_benchmarks.sh || echo "::warning::scripts/run_benchmarks.sh not found"

      - name: Verify directory structure matches README
        run: |
          # Verify key directories exist
          test -d include/agents || (echo "include/agents/ missing" && exit 1)
          test -d include/core || (echo "include/core/ missing" && exit 1)
          test -d include/concurrency || (echo "include/concurrency/ missing" && exit 1)
          test -d src || (echo "src/ missing" && exit 1)
          test -d tests/unit || (echo "tests/unit/ missing" && exit 1)
          test -d tests/e2e || (echo "tests/e2e/ missing" && exit 1)
          test -d docs || (echo "docs/ missing" && exit 1)

          echo "✓ All expected directories exist"

  verify-docker-compose:
    name: Verify docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate docker-compose.yml syntax
        run: |
          docker-compose config >/dev/null
          echo "✓ docker-compose.yml is valid"

      - name: Verify docker-compose services
        run: |
          # Check that expected services exist
          docker-compose config --services | grep -q "test" || (echo "test service missing" && exit 1)
          docker-compose config --services | grep -q "dev" || (echo "dev service missing" && exit 1)
          echo "✓ All expected services defined"

  integration-test:
    name: End-to-End Integration Test
    runs-on: ubuntu-latest
    needs: [verify-ubuntu-latest, verify-readme-commands, verify-docker-compose]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Full integration test
        run: |
          echo "Running full integration test..."

          # Build
          mkdir build && cd build
          cmake -G Ninja ..
          ninja

          # Run tests
          ctest --output-on-failure

          echo "✓ Full integration test passed"

      - name: Summary
        if: always()
        run: |
          echo "Installation verification complete!"
          echo "All README.md build/test/install steps have been validated."
