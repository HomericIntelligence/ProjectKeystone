name: Docker Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  docker-tests:
    name: Docker Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker and docker-compose versions
        run: |
          docker --version
          docker-compose --version

      - name: Test 1 - Build Runtime Image
        run: |
          echo "Building runtime image..."
          docker build --target runtime -t projectkeystone:latest .

          # Verify image exists
          docker images | grep projectkeystone

      - name: Test 2 - Run Tests in Container
        run: |
          echo "Running tests in container..."
          docker run --rm projectkeystone:latest

      - name: Test 3 - Docker Compose Test Service
        run: |
          echo "Running docker-compose test service..."
          docker-compose up --exit-code-from test test

      - name: Test 4 - Docker Compose Development Environment
        run: |
          echo "Testing docker-compose development environment..."

          # Start dev container
          docker-compose up -d dev

          # Wait for container to be ready
          sleep 2

          # Run build and test inside container
          docker-compose exec -T dev bash -c "cd build && cmake -G Ninja .. >/dev/null 2>&1 && ninja && ctest --output-on-failure"

          # Cleanup
          docker-compose down

      - name: Test 5 - Clean Build (No Cache) [Optional]
        if: github.event_name == 'workflow_dispatch'  # Only on manual trigger
        run: |
          echo "Building from scratch (no cache)..."

          # Clean build
          docker-compose build --no-cache test

          # Run tests
          docker-compose up --exit-code-from test test

      - name: Cleanup
        if: always()
        run: |
          docker-compose down 2>/dev/null || true
          docker system prune -f

      - name: Check image size
        run: |
          IMAGE_SIZE=$(docker images projectkeystone:latest --format "{{.Size}}")
          echo "Runtime image size: $IMAGE_SIZE"

          # Warn if image is too large (> 500MB)
          SIZE_MB=$(docker images projectkeystone:latest --format "{{.Size}}" | grep -oP '\d+' | head -1)
          if [[ $SIZE_MB -gt 500 ]]; then
            echo "::warning::Image size ($IMAGE_SIZE) exceeds 500MB threshold"
          fi

  docker-security-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: docker-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build image for scanning
        run: docker build --target runtime -t projectkeystone:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'projectkeystone:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  docker-multi-platform:
    name: Multi-Platform Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build for multiple platforms
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --target runtime \
            -t projectkeystone:latest \
            .
