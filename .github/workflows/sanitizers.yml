name: Sanitizers

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  asan-ubsan:
    name: AddressSanitizer + UndefinedBehaviorSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with ASan + UBSan
        run: |
          docker build \
            --build-arg CMAKE_BUILD_TYPE=Debug \
            --build-arg CMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            --build-arg ASAN_OPTIONS="detect_leaks=1:fast_unwind_on_malloc=0:check_initialization_order=1" \
            --build-arg UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1" \
            --target runtime \
            -t projectkeystone:asan \
            .

      - name: Run tests with ASan + UBSan
        id: run-asan
        run: |
          mkdir -p sanitizer-results/asan
          docker run --rm \
            -e ASAN_OPTIONS="detect_leaks=1:fast_unwind_on_malloc=0:check_initialization_order=1:log_path=/workspace/sanitizer-results/asan/asan.log" \
            -e UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1:log_path=/workspace/sanitizer-results/asan/ubsan.log" \
            -v ${{ github.workspace }}/sanitizer-results:/workspace/sanitizer-results \
            projectkeystone:asan \
            || echo "ASAN_FAILED=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check ASan results
        id: check-asan
        run: |
          if [ -f sanitizer-results/asan/asan.log.* ]; then
            echo "ASan detected issues:"
            cat sanitizer-results/asan/asan.log.*
            echo "asan_status=failed" >> $GITHUB_OUTPUT
          else
            echo "✅ No ASan issues detected"
            echo "asan_status=passed" >> $GITHUB_OUTPUT
          fi

          if [ -f sanitizer-results/asan/ubsan.log.* ]; then
            echo "UBSan detected issues:"
            cat sanitizer-results/asan/ubsan.log.*
            echo "ubsan_status=failed" >> $GITHUB_OUTPUT
          else
            echo "✅ No UBSan issues detected"
            echo "ubsan_status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Upload ASan + UBSan results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: asan-ubsan-results
          path: sanitizer-results/asan/
          retention-days: 30

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with TSan
        run: |
          docker build \
            --build-arg CMAKE_BUILD_TYPE=Debug \
            --build-arg CMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
            --build-arg TSAN_OPTIONS="halt_on_error=1:second_deadlock_stack=1" \
            --target runtime \
            -t projectkeystone:tsan \
            .

      - name: Run tests with TSan
        id: run-tsan
        run: |
          mkdir -p sanitizer-results/tsan
          docker run --rm \
            -e TSAN_OPTIONS="halt_on_error=1:second_deadlock_stack=1:log_path=/workspace/sanitizer-results/tsan/tsan.log" \
            -v ${{ github.workspace }}/sanitizer-results:/workspace/sanitizer-results \
            projectkeystone:tsan \
            || echo "TSAN_FAILED=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check TSan results
        id: check-tsan
        run: |
          if [ -f sanitizer-results/tsan/tsan.log.* ]; then
            echo "TSan detected issues:"
            cat sanitizer-results/tsan/tsan.log.*
            echo "tsan_status=failed" >> $GITHUB_OUTPUT
          else
            echo "✅ No TSan issues detected"
            echo "tsan_status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Upload TSan results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tsan-results
          path: sanitizer-results/tsan/
          retention-days: 30

  msan:
    name: MemorySanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'  # Only run on manual trigger
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with MSan
        run: |
          # MSan requires instrumented libc++, more complex setup
          docker build \
            --build-arg CMAKE_BUILD_TYPE=Debug \
            --build-arg CMAKE_CXX_FLAGS="-fsanitize=memory -fno-omit-frame-pointer -g -O1" \
            --build-arg MSAN_OPTIONS="halt_on_error=1" \
            --target runtime \
            -t projectkeystone:msan \
            .
        continue-on-error: true

      - name: Run tests with MSan
        id: run-msan
        run: |
          mkdir -p sanitizer-results/msan
          docker run --rm \
            -e MSAN_OPTIONS="halt_on_error=1:log_path=/workspace/sanitizer-results/msan/msan.log" \
            -v ${{ github.workspace }}/sanitizer-results:/workspace/sanitizer-results \
            projectkeystone:msan \
            || echo "MSAN_FAILED=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload MSan results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: msan-results
          path: sanitizer-results/msan/
          retention-days: 30

  sanitizer-report:
    name: Sanitizer Report
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [asan-ubsan, tsan]
    if: always()
    steps:
      - name: Download all sanitizer results
        uses: actions/download-artifact@v6
        with:
          path: all-sanitizer-results/
        continue-on-error: true

      - name: Generate sanitizer report
        id: report
        run: |
          echo "## 🔍 Sanitizer Results" > report.md
          echo "" >> report.md
          echo "| Sanitizer | Status | Details |" >> report.md
          echo "|-----------|--------|---------|" >> report.md

          # Check ASan
          if [ -d "all-sanitizer-results/asan-ubsan-results" ]; then
            if ls all-sanitizer-results/asan-ubsan-results/asan.log.* 1> /dev/null 2>&1; then
              echo "| AddressSanitizer | ❌ Issues Found | See artifacts |" >> report.md
              echo "asan_failed=true" >> $GITHUB_OUTPUT
            else
              echo "| AddressSanitizer | ✅ Clean | No issues |" >> report.md
            fi

            # Check UBSan
            if ls all-sanitizer-results/asan-ubsan-results/ubsan.log.* 1> /dev/null 2>&1; then
              echo "| UndefinedBehaviorSanitizer | ❌ Issues Found | See artifacts |" >> report.md
              echo "ubsan_failed=true" >> $GITHUB_OUTPUT
            else
              echo "| UndefinedBehaviorSanitizer | ✅ Clean | No issues |" >> report.md
            fi
          else
            echo "| AddressSanitizer | ⚠️ Not Run | Check workflow logs |" >> report.md
            echo "| UndefinedBehaviorSanitizer | ⚠️ Not Run | Check workflow logs |" >> report.md
          fi

          # Check TSan
          if [ -d "all-sanitizer-results/tsan-results" ]; then
            if ls all-sanitizer-results/tsan-results/tsan.log.* 1> /dev/null 2>&1; then
              echo "| ThreadSanitizer | ❌ Issues Found | See artifacts |" >> report.md
              echo "tsan_failed=true" >> $GITHUB_OUTPUT
            else
              echo "| ThreadSanitizer | ✅ Clean | No issues |" >> report.md
            fi
          else
            echo "| ThreadSanitizer | ⚠️ Not Run | Check workflow logs |" >> report.md
          fi

          echo "" >> report.md
          echo "### Important Notes" >> report.md
          echo "- ASan + UBSan run together (compatible)" >> report.md
          echo "- TSan runs separately (incompatible with ASan)" >> report.md
          echo "- MSan only runs on manual workflow dispatch" >> report.md
          echo "" >> report.md
          echo "---" >> report.md
          echo "*Workflow: [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload sanitizer report
        uses: actions/upload-artifact@v5
        with:
          name: sanitizer-report
          path: report.md
          retention-days: 90

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Sanitizer Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Check for sanitizer failures
        run: |
          if [ "${{ steps.report.outputs.asan_failed }}" = "true" ] || \
             [ "${{ steps.report.outputs.ubsan_failed }}" = "true" ] || \
             [ "${{ steps.report.outputs.tsan_failed }}" = "true" ]; then
            echo "::error::Sanitizers detected issues - check artifacts for details"
            exit 1
          fi
