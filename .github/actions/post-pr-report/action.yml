name: Post PR Report
description: Post or update a report comment on a pull request

inputs:
  title:
    description: Report title (displayed in header)
    required: true
  body:
    description: Report body content (markdown)
    required: true
  marker:
    description: Unique marker string to identify this report type (for update detection)
    required: true
  github-token:
    description: GitHub token for API access
    required: true

runs:
  using: composite
  steps:
    - name: Post or update PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const title = `${{ inputs.title }}`;
          const marker = `<!-- REPORT_MARKER: ${{ inputs.marker }} -->`;
          const body = `${marker}\n## ${title}\n\n${{ inputs.body }}`;

          // Get existing comments
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          // Find existing comment with this marker
          const existingComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes(marker)
          );

          if (existingComment) {
            // Update existing comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body
            });
            console.log(`Updated existing comment ${existingComment.id}`);
          } else {
            // Create new comment
            const { data: newComment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            console.log(`Created new comment ${newComment.id}`);
          }
