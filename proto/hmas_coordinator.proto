syntax = "proto3";

package keystone.hmas;

import "common.proto";

// HMAS Coordinator Service - Task submission and coordination
service HMASCoordinator {
  // Submit a task for execution
  rpc SubmitTask(TaskRequest) returns (TaskResponse);

  // Stream task status updates (server-side streaming)
  rpc StreamTaskStatus(TaskStatusRequest) returns (stream TaskStatusUpdate);

  // Get final task result
  rpc GetTaskResult(TaskResultRequest) returns (TaskResult);

  // Submit task result back to parent
  rpc SubmitResult(TaskResult) returns (ResultAcknowledgement);

  // Cancel a running task
  rpc CancelTask(CancelRequest) returns (CancelResponse);

  // Get task progress (synchronous polling alternative to streaming)
  rpc GetTaskProgress(TaskProgressRequest) returns (TaskProgress);
}

// Task submission request
message TaskRequest {
  string yaml_spec = 1;         // Full YAML task specification as string
  string session_id = 2;        // Session identifier
  int64 deadline_unix_ms = 3;   // Deadline timestamp
  TaskPriority priority = 4;    // Task priority
  string parent_task_id = 5;    // ID of parent task (if any)
}

// Task submission response
message TaskResponse {
  string task_id = 1;           // Unique task identifier
  bool accepted = 2;            // Whether task was accepted
  string assigned_node = 3;     // IP:port of assigned agent node
  string assigned_agent_id = 4; // ID of agent that will execute this task
  string error = 5;             // Error message if not accepted
  int64 accepted_at_unix_ms = 6;
}

// Task status request (for streaming)
message TaskStatusRequest {
  string task_id = 1;
  bool include_subtasks = 2;  // Include status of all subtasks
}

// Task status update (streamed)
message TaskStatusUpdate {
  string task_id = 1;
  TaskPhase phase = 2;
  int32 progress_percent = 3;      // 0-100
  string current_subtask = 4;      // Name of currently executing subtask
  int64 updated_at_unix_ms = 5;
  repeated SubtaskStatus subtasks = 6;
}

// Subtask status
message SubtaskStatus {
  string name = 1;
  TaskPhase phase = 2;
  string assigned_node = 3;
  int32 progress_percent = 4;
}

// Task result request
message TaskResultRequest {
  string task_id = 1;
  int64 timeout_ms = 2;  // How long to wait for result (0 = return immediately)
}

// Task result
message TaskResult {
  string task_id = 1;
  string parent_task_id = 2;        // ID of parent task (for routing)
  TaskPhase status = 3;             // COMPLETED, FAILED, TIMEOUT, CANCELLED
  string result_yaml = 4;           // Result as YAML string (status section)
  string error = 5;                 // Error message if failed
  int64 completed_at_unix_ms = 6;
  string origin_node = 7;           // IP:port of node that produced this result
}

// Result acknowledgement
message ResultAcknowledgement {
  bool acknowledged = 1;
  string message = 2;
}

// Cancel task request
message CancelRequest {
  string task_id = 1;
  string reason = 2;  // Optional reason for cancellation
}

// Cancel response
message CancelResponse {
  bool cancelled = 1;
  string message = 2;
  TaskPhase current_phase = 3;  // Phase when cancellation occurred
}

// Task progress request (synchronous polling)
message TaskProgressRequest {
  string task_id = 1;
  bool include_subtasks = 2;
}

// Task progress response
message TaskProgress {
  string task_id = 1;
  TaskPhase phase = 2;
  int32 progress_percent = 3;
  string current_subtask = 4;
  int64 updated_at_unix_ms = 5;
  repeated SubtaskStatus subtasks = 6;
  bool is_complete = 7;  // True if task is in terminal state
}
