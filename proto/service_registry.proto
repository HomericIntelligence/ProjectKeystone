syntax = "proto3";

package keystone.hmas;

import "common.proto";

// Service Registry - Agent discovery and registration
service ServiceRegistry {
  // Register agent with the registry
  rpc RegisterAgent(AgentRegistration) returns (RegistrationResponse);

  // Send heartbeat to indicate agent is alive
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Unregister agent from the registry
  rpc UnregisterAgent(UnregisterRequest) returns (UnregisterResponse);

  // Query for agents matching criteria
  rpc QueryAgents(AgentQuery) returns (AgentList);

  // Get information about a specific agent
  rpc GetAgent(GetAgentRequest) returns (AgentInfo);

  // List all registered agents
  rpc ListAllAgents(ListAllAgentsRequest) returns (AgentList);
}

// Agent registration request
message AgentRegistration {
  string agent_id = 1;
  string agent_type = 2;  // ChiefArchitectAgent, ComponentLeadAgent, etc.
  int32 level = 3;        // 0 (Chief), 1 (Component), 2 (Module), 3 (Task)
  string ip_port = 4;     // "192.168.1.100:50051"
  repeated string capabilities = 5;  // ["cpp20", "cmake", "python3"]
  int64 timestamp_unix_ms = 6;
}

// Agent registration response
message RegistrationResponse {
  bool success = 1;
  string message = 2;
  string assigned_id = 3;  // Assigned agent ID (if auto-generated)
}

// Heartbeat request
message HeartbeatRequest {
  string agent_id = 1;
  int64 timestamp_unix_ms = 2;
  float cpu_usage_percent = 3;  // Optional metrics
  float memory_usage_mb = 4;    // Optional metrics
  int32 active_tasks = 5;       // Number of currently active tasks
}

// Heartbeat response
message HeartbeatResponse {
  bool acknowledged = 1;
  int64 server_timestamp_unix_ms = 2;
}

// Unregister agent request
message UnregisterRequest {
  string agent_id = 1;
  string reason = 2;  // Optional reason for unregistering
}

// Unregister response
message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

// Query for agents matching criteria
message AgentQuery {
  string agent_type = 1;  // Filter by type (empty = all types)
  int32 level = 2;        // Filter by level (-1 = all levels)
  repeated string required_capabilities = 3;  // Must have ALL these capabilities
  int32 max_results = 4;  // Maximum number of results (0 = unlimited)
  bool only_alive = 5;    // Only return agents that recently sent heartbeat
}

// Get agent by ID
message GetAgentRequest {
  string agent_id = 1;
}

// List all agents request
message ListAllAgentsRequest {
  bool only_alive = 1;  // Only return agents that recently sent heartbeat
}

// List of agents
message AgentList {
  repeated AgentInfo agents = 1;
  int32 total_count = 2;
}
