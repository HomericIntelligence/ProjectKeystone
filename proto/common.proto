syntax = "proto3";

package keystone.hmas;

// Common message types shared across services

// Agent capability (e.g., "cpp20", "cmake", "python3")
message AgentCapability {
  string name = 1;
}

// Agent information for service registry
message AgentInfo {
  string agent_id = 1;
  string agent_type = 2;  // ChiefArchitectAgent, ComponentLeadAgent, etc.
  int32 level = 3;        // 0, 1, 2, 3
  string ip_port = 4;     // "192.168.1.100:50051"
  repeated string capabilities = 5;
  int64 last_heartbeat_unix_ms = 6;
  float cpu_usage_percent = 7;
  float memory_usage_mb = 8;
}

// Task status enumeration
enum TaskPhase {
  TASK_PHASE_UNSPECIFIED = 0;
  TASK_PHASE_PENDING = 1;
  TASK_PHASE_PLANNING = 2;
  TASK_PHASE_WAITING = 3;
  TASK_PHASE_EXECUTING = 4;
  TASK_PHASE_SYNTHESIZING = 5;
  TASK_PHASE_COMPLETED = 6;
  TASK_PHASE_FAILED = 7;
  TASK_PHASE_TIMEOUT = 8;
  TASK_PHASE_CANCELLED = 9;
}

// Task action type
enum TaskActionType {
  TASK_ACTION_UNSPECIFIED = 0;
  TASK_ACTION_DECOMPOSE = 1;    // Decompose into subtasks
  TASK_ACTION_EXECUTE = 2;      // Execute concrete task
  TASK_ACTION_RETURN_RESULT = 3;  // Return result to parent
  TASK_ACTION_SHUTDOWN = 4;     // Shutdown agent
}

// Task priority
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_NORMAL = 2;
  TASK_PRIORITY_HIGH = 3;
  TASK_PRIORITY_CRITICAL = 4;
}

// Aggregation strategy for subtasks
enum AggregationStrategy {
  AGGREGATION_STRATEGY_UNSPECIFIED = 0;
  AGGREGATION_STRATEGY_WAIT_ALL = 1;     // Wait for all subtasks
  AGGREGATION_STRATEGY_FIRST_SUCCESS = 2;  // Return on first success
  AGGREGATION_STRATEGY_MAJORITY = 3;     // Wait for majority
}

// Retry backoff strategy
enum BackoffStrategy {
  BACKOFF_STRATEGY_UNSPECIFIED = 0;
  BACKOFF_STRATEGY_CONSTANT = 1;
  BACKOFF_STRATEGY_LINEAR = 2;
  BACKOFF_STRATEGY_EXPONENTIAL = 3;
}
