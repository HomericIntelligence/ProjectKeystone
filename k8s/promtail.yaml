# Promtail DaemonSet for log collection
# Promtail runs on every node and ships logs from all pods to Loki

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: projectkeystone
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10
        timeout: 10s

    scrape_configs:
      # Scrape logs from Kubernetes pods
      - job_name: kubernetes-pods

        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - projectkeystone

        pipeline_stages:
          # Extract log level from logs (if present)
          - regex:
              expression: '^(?P<timestamp>\S+)\s+(?P<level>\S+)\s+'

          # Parse timestamp
          - timestamp:
              source: timestamp
              format: RFC3339Nano

          # Add labels from extracted fields
          - labels:
              level:

        relabel_configs:
          # Only scrape pods in projectkeystone namespace
          - source_labels:
              - __meta_kubernetes_namespace
            action: keep
            regex: projectkeystone

          # Add namespace as label
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace

          # Add pod name as label
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod

          # Add container name as label
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container

          # Add app label (if available)
          - source_labels:
              - __meta_kubernetes_pod_label_app
            target_label: app

          # Add component label (if available)
          - source_labels:
              - __meta_kubernetes_pod_label_component
            target_label: component

          # Set the path to the log file
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log

      # Scrape logs from systemd journal (optional)
      - job_name: systemd-journal
        journal:
          max_age: 12h
          labels:
            job: systemd-journal
        relabel_configs:
          - source_labels:
              - __journal__systemd_unit
            target_label: unit

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: projectkeystone
  labels:
    app: promtail

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs:
      - get
      - watch
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: projectkeystone

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: projectkeystone
  labels:
    app: promtail
    component: logging
spec:
  selector:
    matchLabels:
      app: promtail
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: promtail
        component: logging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3101"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: promtail

      securityContext:
        runAsNonRoot: false  # Needs root to read /var/log
        runAsUser: 0

      containers:
      - name: promtail
        image: grafana/promtail:2.9.3
        imagePullPolicy: IfNotPresent

        args:
          - -config.file=/etc/promtail/promtail.yaml
          - -config.expand-env=true

        ports:
        - name: http-metrics
          containerPort: 3101
          protocol: TCP

        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: positions
          mountPath: /tmp

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /ready
            port: http-metrics
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /ready
            port: http-metrics
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: positions
        hostPath:
          path: /tmp/promtail-positions
          type: DirectoryOrCreate

      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists

---
apiVersion: v1
kind: Service
metadata:
  name: promtail
  namespace: projectkeystone
  labels:
    app: promtail
    component: logging
spec:
  clusterIP: None
  selector:
    app: promtail
  ports:
  - name: http-metrics
    port: 3101
    targetPort: http-metrics
    protocol: TCP
