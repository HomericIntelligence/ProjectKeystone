apiVersion: v1
kind: Service
metadata:
  name: hmas
  namespace: projectkeystone
  labels:
    app: hmas
    component: agent-system
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: hmas
    component: agent-system
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: hmas-headless
  namespace: projectkeystone
  labels:
    app: hmas
    component: agent-system
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for direct pod access
  selector:
    app: hmas
    component: agent-system
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  publishNotReadyAddresses: false
