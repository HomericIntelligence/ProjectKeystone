apiVersion: v1
kind: Namespace
metadata:
  name: projectkeystone
  labels:
    name: projectkeystone
    app: hmas
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: projectkeystone-quota
  namespace: projectkeystone
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    pods: "50"
