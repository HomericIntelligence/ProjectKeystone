# Kubernetes Secrets for ProjectKeystone HMAS
# Production deployment should use external secret management (e.g., HashiCorp Vault, AWS Secrets Manager)

---
# Grafana admin credentials
# IMPORTANT: Change these values in production!
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: projectkeystone
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: admin
  # Generate with: openssl rand -base64 32
  admin-password: CHANGE_ME_IN_PRODUCTION

---
# TLS certificates for HMAS services
# Generate with cert-manager or external CA
apiVersion: v1
kind: Secret
metadata:
  name: hmas-tls
  namespace: projectkeystone
  labels:
    app: hmas
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
  # Base64-encoded TLS private key
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCi4uLgotLS0tLUVORCBQUklWQVRFIEtFWS0tLS0tCg==

---
