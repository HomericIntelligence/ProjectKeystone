# Kubernetes Secrets for ProjectKeystone HMAS - EXAMPLE FILE
# DO NOT use these values in production!
# Generate actual secrets using the commands below.

---
# Grafana admin credentials
# PRODUCTION: Generate with:
#   kubectl create secret generic grafana-admin-credentials \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=$(openssl rand -base64 32) \
#     -n projectkeystone
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: projectkeystone
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: admin
  # IMPORTANT: Replace with randomly generated password in production!
  # Generate with: openssl rand -base64 32
  admin-password: REPLACE_WITH_RANDOM_PASSWORD

---
# TLS certificates for HMAS services
# PRODUCTION: Generate with cert-manager or external CA:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=hmas.projectkeystone.svc.cluster.local"
#   kubectl create secret tls hmas-tls \
#     --cert=tls.crt --key=tls.key \
#     -n projectkeystone
apiVersion: v1
kind: Secret
metadata:
  name: hmas-tls
  namespace: projectkeystone
  labels:
    app: hmas
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate (example placeholder)
  # PRODUCTION: Replace with actual certificate
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
  # Base64-encoded TLS private key (example placeholder)
  # PRODUCTION: Replace with actual private key
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCi4uLgotLS0tLUVORCBQUklWQVRFIEtFWS0tLS0tCg==

---
# PRODUCTION BEST PRACTICE: Use External Secrets Operator
# See PRODUCTION.md for complete setup instructions
