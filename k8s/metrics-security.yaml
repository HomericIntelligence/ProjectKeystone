# Metrics Security Configuration for ProjectKeystone HMAS
# Phase 6.8 M4: Authentication, authorization, and encryption for metrics endpoints

---
# Secret: Prometheus scrape credentials
# Used by Prometheus to authenticate when scraping HMAS metrics
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-scrape-credentials
  namespace: projectkeystone
  labels:
    app: prometheus
    component: security
type: Opaque
stringData:
  # Basic auth credentials for metrics endpoints
  # PRODUCTION: Generate with:
  #   htpasswd -nB prometheus > auth
  #   kubectl create secret generic prometheus-scrape-credentials \
  #     --from-file=auth=auth -n projectkeystone
  username: prometheus
  # PRODUCTION: Replace with bcrypt hash generated by htpasswd
  # Example: htpasswd -nB prometheus
  password: REPLACE_WITH_STRONG_PASSWORD

---
# Secret: Metrics TLS certificate
# Self-signed certificate for metrics endpoint encryption
# PRODUCTION: Use cert-manager or external CA
apiVersion: v1
kind: Secret
metadata:
  name: metrics-tls
  namespace: projectkeystone
  labels:
    app: hmas
    component: metrics-security
type: kubernetes.io/tls
stringData:
  # Generate with:
  #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #     -keyout tls.key -out tls.crt \
  #     -subj "/CN=hmas-metrics.projectkeystone.svc.cluster.local/O=projectkeystone"
  #   kubectl create secret tls metrics-tls \
  #     --cert=tls.crt --key=tls.key -n projectkeystone
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # PRODUCTION: Replace with actual TLS certificate
    # Generated by cert-manager or external CA
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # PRODUCTION: Replace with actual TLS private key
    # IMPORTANT: Keep this secret secure!
    -----END PRIVATE KEY-----

---
# ConfigMap: Prometheus TLS configuration
# Configures Prometheus to use TLS when scraping metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-tls-config
  namespace: projectkeystone
  labels:
    app: prometheus
    component: security
data:
  # TLS scrape configuration for HMAS metrics
  tls_config.yml: |
    tls_config:
      # Certificate authority to verify server certificates
      ca_file: /etc/prometheus/certs/ca.crt
      # Client certificate for mutual TLS (optional)
      # cert_file: /etc/prometheus/certs/tls.crt
      # key_file: /etc/prometheus/certs/tls.key
      # Verify server certificate (disable only for testing)
      insecure_skip_verify: false
      # Server name for SNI
      server_name: hmas-metrics.projectkeystone.svc.cluster.local

---
# ConfigMap: Basic auth configuration for metrics endpoints
# Used by nginx/envoy sidecar to enforce authentication
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-auth-config
  namespace: projectkeystone
  labels:
    app: hmas
    component: metrics-security
data:
  # Nginx configuration for metrics endpoint with basic auth
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      # Upstream to HMAS metrics endpoint
      upstream hmas_metrics {
        server localhost:9090;
      }

      # HTTPS server for secure metrics
      server {
        listen 9443 ssl;
        server_name hmas-metrics.projectkeystone.svc.cluster.local;

        # TLS configuration
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Basic authentication
        auth_basic "HMAS Metrics";
        auth_basic_user_file /etc/nginx/auth/htpasswd;

        # Metrics endpoint
        location /metrics {
          proxy_pass http://hmas_metrics/metrics;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # Security headers
          add_header X-Content-Type-Options nosniff;
          add_header X-Frame-Options DENY;
          add_header X-XSS-Protection "1; mode=block";
          add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # Health check endpoint (no auth required)
        location /healthz {
          return 200 "OK";
          add_header Content-Type text/plain;
        }
      }
    }

  # htpasswd file for basic auth (bcrypt hashed passwords)
  # PRODUCTION: Generate with: htpasswd -nB prometheus
  htpasswd: |
    # prometheus:$2y$05$... (bcrypt hash)
    # REPLACE WITH ACTUAL BCRYPT HASH

---
# ServiceAccount: Prometheus with limited RBAC permissions
# Principle of least privilege for metrics collection
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-metrics
  namespace: projectkeystone
  labels:
    app: prometheus
    component: security

---
# ClusterRole: Prometheus metrics scraping permissions
# Minimal permissions required for Prometheus to scrape metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-metrics-scraper
  labels:
    app: prometheus
    component: security
rules:
  # Read-only access to discover scrape targets
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]

  # Access to non-resource URLs for metrics
  - nonResourceURLs:
      - /metrics
      - /metrics/cadvisor
    verbs: ["get"]

---
# ClusterRoleBinding: Bind Prometheus ServiceAccount to metrics scraper role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-metrics-scraper
  labels:
    app: prometheus
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-metrics-scraper
subjects:
  - kind: ServiceAccount
    name: prometheus-metrics
    namespace: projectkeystone

---
# NetworkPolicy: Restrict metrics access to Prometheus only
# Additional security layer beyond authentication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hmas-metrics-access
  namespace: projectkeystone
  labels:
    app: hmas
    component: metrics-security
spec:
  podSelector:
    matchLabels:
      app: hmas
  policyTypes:
    - Ingress
  ingress:
    # Only allow Prometheus to access metrics port
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090  # Metrics port
        - protocol: TCP
          port: 9443  # Secure metrics port (with TLS)

---
# PodSecurityPolicy: Enforce security standards for metrics pods
# Prevents privilege escalation and enforces security best practices
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: hmas-metrics-restricted
  labels:
    app: hmas
    component: metrics-security
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - configMap
    - secret
    - emptyDir
    - persistentVolumeClaim
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: MustRunAsNonRoot
  seLinux:
    rule: RunAsAny
  supplementalGroups:
    rule: RunAsAny
  fsGroup:
    rule: RunAsAny
  readOnlyRootFilesystem: false

---
# Role: Access to metrics secrets (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-secrets-reader
  namespace: projectkeystone
  labels:
    app: prometheus
    component: security
rules:
  - apiGroups: [""]
    resources:
      - secrets
    resourceNames:
      - prometheus-scrape-credentials
      - metrics-tls
    verbs: ["get"]

---
# RoleBinding: Grant Prometheus access to metrics secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-metrics-secrets
  namespace: projectkeystone
  labels:
    app: prometheus
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: metrics-secrets-reader
subjects:
  - kind: ServiceAccount
    name: prometheus-metrics
    namespace: projectkeystone
