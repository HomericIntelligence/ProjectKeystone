# Markdownlint configuration for ProjectKeystone
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Default rules for all files
default: true

# MD013: Line length
MD013:
  line_length: 120  # Relaxed from default 80 for technical docs
  heading_line_length: 120
  code_block_line_length: 120
  tables: false  # Don't check line length in tables
  headings: true
  code_blocks: true

# MD033: Inline HTML
MD033:
  allowed_elements: [T, img, br, details, summary]  # Allow common HTML elements

# MD036: Emphasis used instead of heading
MD036: false  # Allow bold text for emphasis (common in planning docs)

# MD040: Fenced code blocks should have a language
MD040: false  # Allow code blocks without language specification

# MD041: First line in file should be a top level heading
MD041: false  # Allow flexibility in documentation structure

# MD046: Code block style
MD046:
  style: fenced  # Prefer fenced code blocks over indented
